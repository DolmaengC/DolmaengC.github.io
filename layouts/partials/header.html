<header class="site-header">
  <div class="container nav">
    <a class="brand" href="/">{{ site.Title }}</a>
    <nav>
      {{ range site.Menus.main }}
        <a href="{{ .URL }}"{{- if or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }} class="active"{{ end }}>{{- .Name -}}</a>
      {{ end }}
    </nav>
  </div>
</header>
